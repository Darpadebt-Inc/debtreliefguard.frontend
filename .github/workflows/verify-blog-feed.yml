name: Verify Blog Feed Integrity

# BLOCKING gate. Enforces blogs.json <-> blog/ file consistency (no null entries,
# no dead links, no orphans) so a partial/bad blog commit can never land on main.
# Counterpart to worker 033's atomic publish: 033 stops creating drift, this stops
# drift from landing.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-blog-feed-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: blogs.json integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify blog feed
        run: node scripts/verify-blog-feed.mjs
