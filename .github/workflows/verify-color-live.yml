name: Verify color live
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Probe pages.dev origin for brand palette
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          probe() {
            url="$1"
            code=$(curl -sSL -m 30 -A "$UA" -H "Accept: text/html" -o /tmp/b -w '%{http_code}' "$url" 2>/dev/null)
            [ -z "$code" ] && code=000
            blue=$(grep -c '#0369a1' /tmp/b 2>/dev/null); blue=${blue:-0}
            teal=$(grep -c '#0f766e' /tmp/b 2>/dev/null); teal=${teal:-0}
            navy=$(grep -c '#0b2b4a' /tmp/b 2>/dev/null); navy=${navy:-0}
            brand=$(grep -oiE '\-\-brand:? *#[0-9a-f]{6}' /tmp/b 2>/dev/null | head -1)
            bytes=$(wc -c < /tmp/b 2>/dev/null)
            printf '| %s | %s | %s | blue:%s teal:%s navy:%s | %s |\n' "$url" "$code" "${bytes:-0}" "$blue" "$teal" "$navy" "${brand:-n/a}"
          }
          {
            echo "## Live brand-palette verification (pages.dev origin, redirects followed)"
            echo "| url | http | bytes | hex counts | --brand |"
            echo "|---|---|---|---|---|"
            probe "https://debtreliefguard-frontend.pages.dev/"
            probe "https://debtreliefguard-frontend.pages.dev/savings.calculator.html"
            probe "https://debtreliefguard-frontend.pages.dev/blog.index.html"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
