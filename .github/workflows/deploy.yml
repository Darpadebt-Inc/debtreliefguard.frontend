name: Deploy (handled by backend — no-op here)

# This repo is PUBLIC and intentionally holds NO Cloudflare secrets. Production deploys run
# from the PRIVATE repo Darpadebt-Inc/debthelpform.backend -> workflow "Deploy Frontends to
# Cloudflare Pages" (deploy-frontends.yml), which centralizes the Cloudflare credential.
# Security rationale: keep the production-deploy token out of public repos (one private
# rotation point, least privilege). Do NOT add CLOUDFLARE_* secrets to this repo.
#
# Why this is a no-op: this workflow previously attempted a Direct Upload and "skipped
# cleanly" (reported green) when no secrets were present — which looked like a successful
# deploy while deploying nothing. That misleading signal is removed. There is NO
# push-trigger here, so pushes no longer produce a fake "Deploy ✓" check. The only real
# deploy signal comes from the backend workflow, which actually uploads and then runs a
# live smoke check.
#
# To deploy: merge to main, then run the backend "Deploy Frontends to Cloudflare Pages"
# workflow (it deploys both frontends and verifies them live). Full details in DEPLOYMENT.md.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notice:
    name: Where deploys happen (this repo does not deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Point to the real deploy path
        run: |
          set -euo pipefail
          msg="This repo does NOT deploy itself. Production deploys run from the PRIVATE backend repo Darpadebt-Inc/debthelpform.backend -> Actions -> 'Deploy Frontends to Cloudflare Pages' (deploys both frontends + live smoke check). The Cloudflare token lives only there so public repos stay secret-free. See DEPLOYMENT.md."
          echo "$msg"
          echo "::notice title=Deploys run from the backend repo::$msg"
          { echo "## Deploy path"; echo ""; echo "$msg"; } >> "$GITHUB_STEP_SUMMARY"
