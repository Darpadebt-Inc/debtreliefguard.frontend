name: Deploy to Cloudflare Pages

# Autonomous live deploy via Direct Upload (wrangler) — independent of the
# Cloudflare Pages Git integration. Runs on GitHub's network-open runners.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CL_ACCOUNT_ID }}
  # Optional override: set repo/org variable PAGES_PROJECT to the exact project name.
  PAGES_PROJECT: ${{ vars.PAGES_PROJECT }}
  SITE_MATCH: debtreliefguard

jobs:
  deploy:
    name: Static deploy (Direct Upload)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing Cloudflare secrets::Add secrets CLOUDFLARE_API_TOKEN (or CF_API_TOKEN) and CLOUDFLARE_ACCOUNT_ID (or CL_ACCOUNT_ID) to this repo or the org. Token needs 'Cloudflare Pages: Edit'."
            exit 1
          fi

      - name: Resolve Pages project
        id: proj
        run: |
          set -euo pipefail
          name="${PAGES_PROJECT:-}"
          if [ -z "$name" ]; then
            resp=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects?per_page=100")
            if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
              echo "::error title=Cloudflare API error::$(echo "$resp" | jq -c '.errors')"; exit 1
            fi
            name=$(echo "$resp" | jq -r --arg m "$SITE_MATCH" '
              .result[] | select(
                (.name|ascii_downcase|contains($m)) or
                (((.domains // [])|join(","))|ascii_downcase|contains($m)) or
                ((.subdomain // "")|ascii_downcase|contains($m))
              ) | .name' | head -n1)
            if [ -z "$name" ] || [ "$name" = "null" ]; then
              echo "::error title=No matching Pages project::No project matched '$SITE_MATCH'. Existing projects:"
              echo "$resp" | jq -r '.result[].name'
              echo "Set repo variable PAGES_PROJECT to the exact project name."; exit 1
            fi
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Resolved Cloudflare Pages project: $name"

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          npx --yes wrangler@4.32.0 pages deploy . \
            --project-name "${{ steps.proj.outputs.name }}" \
            --branch "${{ github.ref_name }}" \
            --commit-hash "${{ github.sha }}" \
            --commit-dirty=true
